<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Coder Tech JAMB Assistance</title>
<style>
body{font-family:Arial,sans-serif;background:#eef2f7;margin:0;padding:0;}
header{background:#0b5ed7;color:white;padding:20px;text-align:center;box-shadow:0 2px 6px rgba(0,0,0,0.2);}
.container{width:90%;max-width:900px;margin:20px auto;padding:25px;background:white;border-radius:10px;box-shadow:0 0 12px rgba(0,0,0,0.2);}
button{padding:10px 18px;margin:5px;font-size:14px;background:#0b5ed7;color:white;border:none;border-radius:5px;cursor:pointer;transition:0.3s;}
button:hover{background:#084298;}
input{padding:10px;margin:5px;width:95%;border-radius:5px;border:1px solid #ccc;}
.option{background:#f2f2f2;padding:12px;margin:8px;border-radius:6px;cursor:pointer;transition:0.3s;}
.option:hover{background:#ddd;}
.correct{background:#28a745;color:white;}
.wrong{background:#dc3545;color:white;}
#timer{font-size:18px;color:red;margin-bottom:10px;font-weight:bold;}
#explanation{margin-top:10px;padding:10px;background:#f0f0f0;border-radius:6px;display:none;}
#progress-container{width:100%;background:#ddd;border-radius:10px;margin-bottom:15px;}
#progress-bar{width:0%;height:20px;background:#28a745;border-radius:10px;transition:width 0.4s;}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));grid-gap:10px;}
.subject-btn{padding:12px;background:#0b5ed7;color:white;border-radius:8px;text-align:center;cursor:pointer;transition:0.3s;}
.subject-btn:hover{background:#084298;}
#attemptContainer{margin-top:15px;display:none;}
</style>
</head>
<body>
<header>
<h1>Coder Tech JAMB Assistance</h1>
<p>Practice JAMB CBT Exams</p>
</header>

<div class="container" id="home">
<h2>Login / Register</h2>
<input id="stuName" placeholder="Full Name"><br>
<input id="stuEmail" placeholder="Email"><br>
<input id="stuPass" type="password" placeholder="Password"><br>
<button onclick="register()">Register</button>
<button onclick="login()">Login</button>
</div>

<div class="container" id="dashboard" style="display:none">
<h2>Welcome <span id="userName"></span></h2>
<h3>Select Subject</h3>
<div class="grid" id="subjectGrid"></div>
<div id="attemptContainer">
  <button id="attemptBtn">Attempt Quiz</button>
</div>
</div>

<div class="container" id="quiz" style="display:none">
<div id="timer"></div>
<div id="progress-container"><div id="progress-bar"></div></div>
<h3 id="question"></h3>
<div id="options"></div>
<div id="explanation"></div>
<button onclick="nextQuestion()">Next Question</button>
<button onclick="backToDashboard()">Back to Dashboard</button>
</div>

<div class="container" id="result" style="display:none">
<h2 id="score"></h2>
<div id="review"></div>
<button onclick="restart()">Practice Again</button>
</div>

<script>
let loggedUser=null;
function register(){
  let n=document.getElementById('stuName').value.trim();
  let e=document.getElementById('stuEmail').value.trim();
  let p=document.getElementById('stuPass').value.trim();
  if(!n||!e||!p){alert('Fill all fields'); return;}
  if(localStorage.getItem(e)){alert('Email already registered'); return;}
  localStorage.setItem(e,JSON.stringify({name:n,email:e,password:p}));
  alert('Account created, now login');
}
function login(){
  let e=document.getElementById('stuEmail').value.trim();
  let p=document.getElementById('stuPass').value.trim();
  let user=JSON.parse(localStorage.getItem(e));
  if(user && user.password===p){loggedUser=user; showDashboard();} else {alert('Invalid login');}
}
function backToDashboard(){
  clearInterval(timer);
  document.getElementById('quiz').style.display='none';
  showDashboard();
}

const subjects=["English","Mathematics","Physics","Chemistry","Biology","Economics","Government","Literature","Commerce","Accounting","Geography","CRS","IRS","Agriculture","Civic Education"];
let selectedSubject = null;

function showDashboard(){
  document.getElementById('home').style.display='none';
  document.getElementById('dashboard').style.display='block';
  document.getElementById('userName').innerText=loggedUser.name;

  selectedSubject = null;
  document.getElementById('attemptContainer').style.display = 'none';

  let html='';
  subjects.forEach(s=>{
    html+=`<div class='subject-btn' onclick="selectSubject('${s}', this)">${s}</div>`;
  });
  document.getElementById('subjectGrid').innerHTML=html;
}

function selectSubject(sub, el){
  selectedSubject = sub;
  // Highlight selected
  Array.from(document.getElementsByClassName('subject-btn')).forEach(btn=>btn.style.background='#0b5ed7');
  el.style.background='#084298';
  // Show attempt button
  document.getElementById('attemptContainer').style.display = 'block';
}

document.getElementById('attemptBtn').onclick = ()=>{
  if(selectedSubject) startQuiz(selectedSubject);
}

let questions=[], index=0, score=0, userAnswers=[], timer, timeLeft=1800;
function startQuiz(sub){
  if(!QUESTION_BANK[sub] || QUESTION_BANK[sub].length===0){alert('No questions'); return;}
  questions=QUESTION_BANK[sub].slice(); index=0; score=0; userAnswers=[];
  timeLeft=1800;
  document.getElementById('dashboard').style.display='none';
  document.getElementById('quiz').style.display='block';
  document.getElementById('explanation').style.display='none';
  updateProgress();
  startTimer();
  loadQuestion();
}
function startTimer(){
  clearInterval(timer);
  timer=setInterval(()=>{
    if(timeLeft<=0){clearInterval(timer); showResults(); return;}
    let m=Math.floor(timeLeft/60), s=timeLeft%60;
    document.getElementById('timer').innerText=`Time Left: ${m}m ${s}s`;
    timeLeft--;
  },1000);
}
function updateProgress(){
  const progress=((index)/questions.length)*100;
  document.getElementById('progress-bar').style.width=progress+"%";
}
function loadQuestion(){
  if(index>=questions.length){showResults(); return;}
  updateProgress();
  const q=questions[index];
  document.getElementById('question').innerText=(index+1)+". "+q.q;
  document.getElementById('options').innerHTML=q.o.map(opt=>`<div class='option' onclick="selectAnswer('${opt}', event)">${opt}</div>`).join('');
  document.getElementById('explanation').style.display='none';
}
function selectAnswer(ans,event){
  if(index>=questions.length) return;
  userAnswers[index]=ans;
  const correctAns=questions[index].a;
  if(ans===correctAns){
    event.target.classList.add('correct');
    score++;
  } else {
    event.target.classList.add('wrong');
    Array.from(document.getElementById('options').children).forEach(o=>{if(o.innerText===correctAns)o.classList.add('correct');});
  }
  document.getElementById('explanation').innerText=questions[index].e;
  document.getElementById('explanation').style.display='block';
  Array.from(document.getElementById('options').children).forEach(o=>o.onclick=null);
}
function nextQuestion(){index++; loadQuestion();}
function showResults(){
  clearInterval(timer);
  document.getElementById('quiz').style.display='none';
  document.getElementById('result').style.display='block';
  document.getElementById('score').innerText=`Score: ${score}/${questions.length} (${Math.round(score/questions.length*100)}%)`;
  document.getElementById('review').innerHTML=questions.map((q,i)=>`<p><strong>Q${i+1}:</strong> ${q.q}</p><p>Your answer: ${userAnswers[i]||"No answer"}</p><p>Correct: ${q.a}</p><p><em>Explanation:</em> ${q.e}</p><hr>`).join('');
}
function restart(){
  document.getElementById('result').style.display='none';
  showDashboard();
}
</script>
</body>
